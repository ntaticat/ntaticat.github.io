<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensores</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <h1>Sensores</h1>
    <p>Esta aplicacion web obtiene datos de una REST API desarrollada en Python con un framework de desarrollo web
        llamado Flask</p>
    <ul id="listaObjetosSensores">
    </ul>

    <div>
        <h2>Simulación del sensor enviando datos</h2>
        <form id="formSimuladorSensor">
            <label for="sensorId">Id</label>
            <input id="sensorId" placeholder="El identificador" type="text">
            <br>
            <label for="sensorNombre">Nombre</label>
            <input id="sensorNombre" placeholder="La clave" type="text">
            <br>
            <label for="sensorDato">Dato</label>
            <input id="sensorDato" placeholder="El valor" type="text">
            <br>
            <input id="btnForm" type="button" value="Enviar datos del sensor">
        </form>
    </div>

    <script src="index.js"></script>
</body>

</html>
